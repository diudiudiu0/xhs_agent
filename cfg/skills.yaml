# Standard skill metadata for the XHS account-management agent.
#
# 这里维护“管理大脑看到的技能说明”。Python 文件只负责执行逻辑，
# 这些容易调整的自然语言描述、示例、风险等级、输入输出说明和结果提示都放在这里。

skills:
  generate_image_prompts:
    description: 根据参考图片、URL 或用户目标生成一组图片生成提示词。
    input_schema:
      input_image: 可选。本地图片路径或图片 URL。
      user_goal: 可选。用户对风格、主体、用途和修改方向的自然语言要求。
      count: 可选。需要生成的提示词数量。
    output_schema:
      prompts: 图片提示词列表。
      count: 提示词数量。
    risk_level: low
    side_effects:
      - llm_api_call
      - updates_session_memory
    tags:
      - image
      - prompt
      - creative
    examples:
      - 根据 doc/pic_exam.png 生成 3 条脚轮商业图提示词
      - 看这张产品图，写一组小红书封面图 prompt
    messages:
      success: 已生成 {count} 条图片提示词。
      observation_count: 生成提示词数量：{count}

  revise_image_prompts:
    description: 根据用户反馈修改当前会话中的图片提示词。
    input_schema:
      revision_instruction: 必填。对当前提示词的修改要求。
    output_schema:
      prompts: 修改后的图片提示词列表。
      count: 提示词数量。
    risk_level: low
    side_effects:
      - llm_api_call
      - updates_session_memory
    tags:
      - image
      - prompt
      - revision
    examples:
      - 把第二张改成参数信息图
      - 第一张不要纯白背景，增加品牌和生活场景
    messages:
      success: 已修改 {count} 条图片提示词。
      observation_count: 修改提示词数量：{count}
      missing_instruction: revision_instruction 不能为空。

  generate_images:
    description: 根据当前会话或显式传入的图片提示词生成图片，并保存到本机目录。
    input_schema:
      prompts: 可选。图片提示词列表；为空时使用当前会话提示词。
    output_schema:
      image_paths: 本机图片路径列表。
      count: 图片数量。
    risk_level: low
    side_effects:
      - image_api_call
      - writes_local_files
      - updates_session_memory
    tags:
      - image
      - generation
      - asset
    examples:
      - 用当前提示词生成图片
      - 根据这三条 prompt 出三张图
    messages:
      success: 已生成 {count} 张图片。
      observation_count: 保存图片数量：{count}

  plan_note_text:
    description: 根据当前图片提示词或用户给定标题，生成小红书帖子标题和正文。
    input_schema:
      title: 可选。用户指定标题；为空时由模型生成标题。
    output_schema:
      title: 帖子标题。
      content: 帖子正文。
    risk_level: low
    side_effects:
      - llm_api_call
      - updates_session_memory
    tags:
      - content
      - copywriting
      - note
    examples:
      - 根据当前图片提示词写一篇脚轮推荐文案
      - 标题用脚轮选购指南，然后写正文
    messages:
      success: 已生成发帖文案：{title}
      observation_title: 标题：{title}
      observation_content_length: 正文长度：{content_length}

  create_note_draft:
    description: 使用当前会话中的图片和文案创建一篇新的小红书图文草稿，并暂存离开。
    input_schema:
      image_files: 可选。本机图片路径列表；为空时使用当前会话生成的图片。
    output_schema:
      title: 草稿标题。
      image_count: 使用图片数量。
    risk_level: medium
    side_effects:
      - opens_browser_if_needed
      - uploads_local_files
      - writes_page_content
      - saves_local_browser_draft
    tags:
      - draft
      - publish
      - page
    examples:
      - 用当前生成的图片和文案创建草稿
      - 把这些图片发到小红书草稿箱
    messages:
      success: 新的小红书图文草稿创建流程已执行。
      observation_title: 标题：{title}
      observation_image_count: 图片数量：{image_count}
      default_title: 使用配置或生成标题
      next_suggestion: 可以查看草稿箱确认保存结果，或继续生成下一篇选题。

  open_creator_page:
    description: 打开或复用小红书创作中心页面，并保存在会话上下文中。
    input_schema: {}
    output_schema:
      url: 当前页面 URL。
    risk_level: low
    side_effects:
      - opens_browser
      - uses_persistent_browser_profile
    tags:
      - page
      - browser
      - setup
    examples:
      - 打开小红书创作中心
      - 准备页面环境
    messages:
      success: 已打开或复用小红书创作中心页面。
      observation_url: 当前 URL：{url}

  get_page_state:
    description: 获取当前浏览器页面状态，例如加载阶段、响应情况、弹窗、文件输入框数量。
    input_schema: {}
    output_schema:
      state: 浏览器状态快照。
      summary: 状态摘要文本。
    risk_level: low
    side_effects:
      - opens_browser_if_needed
      - reads_page_state
    tags:
      - page
      - browser
      - observe
    examples:
      - 查看页面现在有没有卡住
      - 检查是否有弹窗

  explore_page_task:
    description: 通用网页操作技能。用于查看、编辑、删除、保存当前草稿、进入草稿箱、读取页面内容等依赖当前页面状态的任务。
    input_schema:
      user_goal: 必填。用户对页面任务的自然语言目标。
      max_steps: 可选。最大探索步数。
      worklog_hints: 可选。长期记忆检索到的历史成功经验。
    output_schema:
      answer: 任务结果。
      steps: 探索步骤。
      next_suggestion: 下一步建议。
    risk_level: variable
    side_effects:
      - opens_browser_if_needed
      - clicks_page
      - may_modify_page_content
    tags:
      - page
      - browser
      - exploration
      - operation
    examples:
      - 保存当前草稿并回到首页
      - 查看草稿箱里的稿子详情
      - 把当前草稿标题改成 agent测试
    messages:
      missing_goal: user_goal 不能为空。
      failed: 页面探索任务未完成。
      success: 页面探索任务已完成。

  handle_dialogs:
    description: 尝试处理当前页面上的网页弹窗、上传收尾弹窗或文件选择器残留影响。
    input_schema: {}
    output_schema:
      handled: 是否处理了弹窗。
    risk_level: low
    side_effects:
      - opens_browser_if_needed
      - clicks_dialog_controls
    tags:
      - page
      - browser
      - dialog
    examples:
      - 关闭上传弹窗
      - 处理当前页面弹窗
    messages:
      success: 弹窗处理结果：{handled}

  show_session_memory:
    description: 读取当前技能会话记忆，包括已生成提示词、图片、标题正文和页面是否打开。
    input_schema: {}
    output_schema:
      memory_text: 会话记忆文本。
    risk_level: low
    side_effects:
      - reads_session_memory
    tags:
      - session
      - memory
    examples:
      - 查看当前会话记忆
      - 现在有哪些已生成素材

  close_session:
    description: 关闭当前浏览器和 Playwright 会话，释放页面资源。
    input_schema: {}
    output_schema:
      closed: 是否已关闭。
    risk_level: low
    side_effects:
      - closes_browser
    tags:
      - session
      - browser
    examples:
      - 关闭当前浏览器会话
      - 结束本轮账号管理会话
    messages:
      success: 已关闭当前技能会话。
      observation: 当前技能会话已关闭。
