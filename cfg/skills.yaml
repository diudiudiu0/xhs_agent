# Skill catalog for the XHS account-management manager agent.
#
# The manager agent reads this file to decide which ability to call.
# Python skill files should only execute logic; descriptions, risk policy,
# examples, and manager-facing guidance should stay here.

skills:
  generate_image_prompts:
    description: 根据参考图片、本机图片路径、图片 URL 或用户目标，生成一组可交给图片生成模型的高质量图片提示词。
    executor_type: agent
    executor_agent: image_prompt_agent
    autonomy_level: medium
    manager_role: manager 提供图片来源、生成数量和用户目标；该 skill 负责调用看图模型或提示词模型完成提示词生成。
    input_schema:
      input_image: 可选。本机图片路径或图片 URL；为空时使用 cfg/image_task.yaml 中的任务配置。
      user_goal: 可选。用户对图片风格、用途、主体和修改方向的自然语言要求。
      count: 可选。需要生成的提示词数量。
    output_schema:
      prompts: 图片提示词列表。
      count: 提示词数量。
    preconditions:
      - 如需要看图生成，input_image 或 cfg/image_task.yaml 中的 input_image 必须有效。
    memory_reads:
      - session_memory
      - image_task_config
    memory_writes:
      - generated_prompts
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - llm_api_call
      - updates_session_memory
    tags:
      - image
      - prompt
      - creative
      - specialist_agent
    examples:
      - 根据 doc/pic_exam.png 生成 3 条脚轮商业图提示词
      - 看这张产品图，写一组小红书封面图 prompt
    messages:
      success: 已生成 {count} 条图片提示词。
      observation_count: 生成提示词数量：{count}

  revise_image_prompts:
    description: 根据用户反馈修改当前会话中的图片提示词列表，保持数量一致并输出可直接用于图片生成的提示词。
    executor_type: agent
    executor_agent: image_prompt_agent
    autonomy_level: medium
    manager_role: manager 传入用户修改要求；该 skill 负责重写当前 session 中的提示词。
    input_schema:
      revision_instruction: 必填。用户对当前提示词的修改要求。
    output_schema:
      prompts: 修改后的图片提示词列表。
      count: 提示词数量。
    preconditions:
      - session_memory.generated_prompts 必须已有内容。
    memory_reads:
      - generated_prompts
    memory_writes:
      - generated_prompts
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - llm_api_call
      - updates_session_memory
    tags:
      - image
      - prompt
      - revision
      - specialist_agent
    examples:
      - 第二张提示词加上 M6 参数信息
      - 第一张不要纯白背景，增加品牌和生活场景
    messages:
      success: 已修改 {count} 条图片提示词。
      observation_count: 修改提示词数量：{count}
      missing_instruction: revision_instruction 不能为空。

  generate_images:
    description: 根据当前会话或显式传入的图片提示词生成图片，并保存到本机配置目录，按顺序命名避免覆盖。
    executor_type: tool
    executor_agent: image_generation_service
    autonomy_level: low
    manager_role: manager 提供 prompts 或使用 session 中的 prompts；该 skill 负责调用图片生成 API 并保存文件。
    input_schema:
      prompts: 可选。图片提示词列表；为空时使用当前会话提示词。
    output_schema:
      image_paths: 本机图片路径列表。
      count: 图片数量。
    preconditions:
      - prompts 或 session_memory.generated_prompts 必须非空。
    memory_reads:
      - generated_prompts
      - image_task_config
    memory_writes:
      - generated_images
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - image_api_call
      - writes_local_files
      - updates_session_memory
    tags:
      - image
      - generation
      - asset
      - tool
    examples:
      - 用当前提示词生成图片
      - 根据这三条 prompt 出三张图
    messages:
      success: 已生成 {count} 张图片。
      observation_count: 保存图片数量：{count}

  plan_note_text:
    description: 根据图片提示词、生成图片、主题或用户给定标题，生成小红书帖子标题和正文；正文应自然、实用，不使用疑问句作为主要表达方式。
    executor_type: agent
    executor_agent: content_agent
    autonomy_level: medium
    manager_role: manager 提供标题、主题或素材上下文；该 skill 负责生成帖子标题和正文。
    input_schema:
      title: 可选。用户指定的标题；为空时由模型生成标题。
    output_schema:
      title: 帖子标题。
      content: 帖子正文。
    preconditions:
      - 最好已有 generated_prompts 或明确主题；没有时使用 cfg/task.yaml 中的发帖任务配置。
    memory_reads:
      - generated_prompts
      - generated_images
      - note_task_config
    memory_writes:
      - last_note_title
      - last_note_content
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - llm_api_call
      - updates_session_memory
    tags:
      - content
      - copywriting
      - note
      - specialist_agent
    examples:
      - 根据当前图片提示词写一篇脚轮推荐文案
      - 标题用脚轮选购指南，然后写正文
    messages:
      success: 已生成发帖文案：{title}
      observation_title: 标题：{title}
      observation_content_length: 正文长度：{content_length}

  create_generated_note_draft:
    description: 根据参考图或默认图片先生成图片提示词，再生成本机发帖图片，再生成标题正文，最后创建小红书图文草稿并暂存离开。它是“根据参考图生成图片并发成草稿”的高层硬顺序 workflow。
    executor_type: workflow
    executor_agent: generated_note_workflow
    autonomy_level: medium
    manager_role: |
      manager 在用户要求“根据默认图片/参考图片生成发帖图片并创建草稿”时优先调用这个 skill，而不是分别调用 create_note_draft。
      该 workflow 内部强制顺序为 generate_image_prompts -> generate_images -> plan_note_text -> create_note_draft。
      默认图片只作为生成提示词的参考图，不会作为最终帖子图片上传；最终上传素材必须来自 generate_images 的输出。
      如果用户要求“先查看草稿箱，如果为空再新建”，manager 应先调用 explore_page_task 判断草稿箱是否为空；确认需要新建后再调用本 skill。
    input_schema:
      input_image: 可选。本机参考图路径或图片 URL；为空时使用 cfg/image_task.yaml 中的默认参考图。
      user_goal: 可选。用户对图片风格、用途、产品和发帖目标的自然语言要求。
      title: 可选。用户指定的帖子标题；为空时由文案模型生成。
      count: 可选。生成图片数量；为空时使用 cfg/image_task.yaml。
    output_schema:
      prompts: 图片提示词列表。
      image_paths: 生成后的本机图片路径列表。
      note_text: 标题正文。
      draft_result: 草稿创建结果。
    preconditions:
      - 参考图来自 input_image 或 cfg/image_task.yaml。
      - 图文笔记不允许纯文字，因此该 workflow 必须先生成图片，再创建草稿。
      - 不能把默认参考原图当作最终上传素材，除非用户明确要求使用 create_note_draft 并允许 allow_default_media。
    memory_reads:
      - image_task_config
      - note_task_config
      - session_memory
    memory_writes:
      - generated_prompts
      - generated_images
      - last_note_title
      - last_note_content
      - last_created_draft_title
    risk_policy:
      requires_confirmation_for:
        - publish_public_note
      note: 默认只暂存离开，不正式发布。
    risk_level: medium
    side_effects:
      - llm_api_call
      - image_api_call
      - writes_local_files
      - opens_browser_if_needed
      - uploads_local_files
      - writes_page_content
      - saves_local_browser_draft
    tags:
      - draft
      - image
      - generation
      - publish
      - workflow
      - recommended
    examples:
      - 根据默认图片生成帖子图片，标题为家居脚轮推荐，并创建草稿
      - 用 doc/pic_exam.png 作为参考图生成三张图，再写文案发到草稿箱
      - 草稿箱为空时，为我生成图片并创建一篇图文草稿
    messages:
      success: 已按“提示词生成 -> 图片生成 -> 文案生成 -> 创建草稿”的流程创建草稿：{title}
      missing_prompts: 图片提示词生成失败，已停止创建草稿。
      missing_images: 图片生成失败，已停止创建草稿。
      draft_failed: 草稿创建失败。
      draft_failed_with_reason: 草稿创建失败：{reason}
      observation_prompt_count: 图片提示词数量：{count}
      observation_image_count: 生成图片数量：{count}
      observation_title: 标题：{title}
      next_suggestion: 可以查看草稿箱确认保存结果，或继续规划下一篇内容。

  create_note_draft:
    description: 从零创建一篇新的小红书图文或视频草稿的完整工作流：打开/复用创作中心、进入图文或视频发布入口、绕过系统文件选择器上传本机素材、等待上传完成、处理上传收尾弹窗、填写标题、填写正文、点击暂存离开并确认保存。适合“新建草稿/把生成图片发成草稿”，不适合编辑当前页面已有草稿。
    executor_type: workflow
    executor_agent: draft_workflow
    autonomy_level: medium
    manager_role: |
      manager 确认这是“已有最终本机素材后，从零新建草稿”任务后调用。该 workflow 自己负责页面上传、标题正文填写、上传弹窗收尾和暂存离开，不需要 manager 再调用 explore_page_task 去点击上传按钮。
      如果用户要求先根据参考图生成图片，再创建草稿，应优先调用 create_generated_note_draft，而不是直接调用本 skill。
      如果用户任务包含“先查看草稿箱，如果为空再新建”，manager 应先调用 explore_page_task 获取草稿箱结果；只有当结果明确表示草稿箱为空或需要新建时，才继续生成图片、生成文案并调用 create_note_draft。
      如果用户已经要求根据默认图片生成发帖图片，标准顺序是：generate_image_prompts -> generate_images -> plan_note_text -> create_note_draft。
    input_schema:
      image_files: 可选。本机图片路径列表；为空时使用当前会话生成的图片。
      allow_default_media: 可选，默认 false。只有用户明确要求直接上传默认原图时才设为 true；如果用户要求先生成提示词或生成图片，必须保持 false。
    output_schema:
      title: 草稿标题。
      image_count: 使用图片数量。
    preconditions:
      - 需要已有标题正文，或 cfg/task.yaml 中可以生成标题正文。
      - 图文笔记需要图片素材；视频笔记需要视频素材。
      - 如果图片素材来自图片生成流程，应先成功调用 generate_image_prompts 和 generate_images，使 session_memory.generated_images 非空。
      - 默认不会把 cfg/task.yaml 中的 default_image_file 原图当作发帖图片上传；没有 image_files 或 generated_images 时会失败，以防跳过图片生成流程。
      - 如果标题为空，应先调用 plan_note_text 生成标题正文；如果标题已给定，也应调用 plan_note_text 结合图片提示词生成正文。
    memory_reads:
      - generated_images
      - last_note_title
      - last_note_content
      - note_task_config
    memory_writes:
      - last_created_draft_title
    risk_policy:
      requires_confirmation_for:
        - publish_public_note
      note: 该 workflow 默认暂存离开，不正式发布；如果未来改为发布，manager 必须确认。
    risk_level: medium
    side_effects:
      - opens_browser_if_needed
      - uploads_local_files
      - writes_page_content
      - saves_local_browser_draft
    tags:
      - draft
      - publish
      - page
      - workflow
    examples:
      - 用当前生成的图片和文案创建草稿
      - 把这些图片发到小红书草稿箱
      - 先生成三张脚轮图片，再写标题正文并创建图文草稿
      - 草稿箱为空时，新建标题为“家居脚轮推荐”的图文草稿
    messages:
      success: 新的小红书图文草稿创建流程已执行。
      observation_title: 标题：{title}
      observation_image_count: 图片数量：{image_count}
      default_title: 使用配置或生成标题
      next_suggestion: 可以查看草稿箱确认保存结果，或继续生成下一篇选题。

  collect_latest_published_note_metrics:
    description: 打开或复用小红书主站，进入“我 -> 笔记”，点击指定索引的一条已发布笔记，采集发布时间、标题、正文、评论、评论数量、收藏数、点赞数和分享数，并按标题和发布时间去重保存到本地 JSON。
    executor_type: workflow
    executor_agent: web_note_metrics_collector
    autonomy_level: medium
    manager_role: manager 在用户要求采集主页最新笔记数据、查看已发布笔记互动数据、沉淀评论与互动指标时调用；该 workflow 负责网页导航、数据提取和本地去重保存。
    input_schema:
      note_index: 可选。个人主页笔记列表中的索引，0 表示最上方第一条。
      output_file: 可选。保存 JSON 的本机路径；为空时使用 cfg/account_data.yaml 中的 output_file。
    output_schema:
      note: 采集到的单篇笔记数据，包含 title、content、published_at、comments、comment_count、collect_count、like_count、share_count。
      storage: JSON 写入结果，包括 added、duplicate、output_file 和 note_count。
    preconditions:
      - 需要先运行 test/integration/browser_session_control.py --target web --mode login 完成小红书主站登录。
      - 小红书主站持久浏览器 profile 不能被其他脚本占用。
    memory_reads:
      - browser_session
      - account_data_config
    memory_writes:
      - last_collected_note_metrics
      - last_collected_note_metrics_file
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - opens_browser_if_needed
      - reads_web_page
      - writes_local_json
    tags:
      - account_data
      - metrics
      - published_notes
      - comments
      - web_site
      - workflow
    examples:
      - 采集我主页最新一篇笔记的数据
      - 打开我发布的第一篇笔记，保存点赞收藏评论和分享数
      - 把最新笔记评论数据写到 json
    messages:
      success: 已采集并保存最新笔记数据：{title} -> {output_file}
      duplicate: 检测到同标题同发布时间的记录已存在，未重复写入：{title}
      observation_title: 标题：{title}
      observation_time: 发布时间：{published_at}
      observation_counts: 点赞={like_count} 收藏={collect_count} 评论={comment_count} 分享={share_count}

  collect_note_metrics:
    description: 刷新采集当前个人主页“笔记”页中可见的全部已发布笔记数据。会逐篇打开笔记详情，采集标题、正文、发布时间、评论楼主内容、评论数量、收藏数、点赞数和分享数，并覆盖写入 data/xhs_published_note_metrics.json，形成一次完整账号数据快照。
    executor_type: workflow
    executor_agent: web_note_metrics_collector
    autonomy_level: medium
    manager_role: manager 在用户要求采集笔记互动数据、更新账号数据、刷新已发布笔记表现、准备账号分析时调用；如果用户没有指定范围，默认刷新当前可见全部已发布笔记。
    input_schema:
      max_notes: 可选。本次最多刷新多少篇；为空时使用 cfg/account_data.yaml 中的 max_notes_per_refresh。
      output_file: 可选。保存 JSON 的本机路径。
    output_schema:
      notes: 本次采集到的全部笔记数据列表，每篇包含 title、content、published_at、comments、comment_count、collect_count、like_count、share_count。
      storage: JSON 覆盖写入结果。
    preconditions:
      - 需要先运行 test/integration/browser_session_control.py --target web --mode login 完成小红书主站登录。
    memory_reads:
      - browser_session
      - account_data_config
    memory_writes:
      - last_collected_published_notes
      - last_collected_note_metrics_file
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - opens_browser_if_needed
      - reads_web_page
      - writes_local_json
    tags:
      - account_data
      - metrics
      - published_notes
      - comments
      - web_site
      - workflow
    examples:
      - 刷新我主页全部已发布笔记的数据
      - 更新账号笔记互动指标，顺便保存正文
      - 采集已发布笔记数据用于账号分析
    messages:
      success: 已刷新 {count} 篇已发布笔记数据 -> {output_file}
      partial_success: 已刷新 {count} 篇已发布笔记数据，另有 {error_count} 篇采集失败 -> {output_file}
      observation_count: 本次刷新笔记数量：{count}
      observation_note: "{index}. {title}（{published_at}）点赞={like_count} 收藏={collect_count} 评论={comment_count}"

  analyze_account_performance:
    description: 读取 data/xhs_published_note_metrics.json，对账号已采集笔记进行表现分析，包括总指标、平均指标、高互动笔记、关键词、评论样本和运营洞察。
    executor_type: tool
    executor_agent: account_management_service
    autonomy_level: low
    manager_role: manager 在用户要求分析账号表现、复盘笔记数据、判断内容方向时调用。
    input_schema:
      metrics_file: 可选。笔记指标 JSON 文件路径。
      top_n: 可选。返回前几篇高互动笔记。
    output_schema:
      note_count: 已分析笔记数。
      totals: 总点赞、收藏、评论、分享。
      averages: 平均指标。
      top_notes: 高互动笔记列表。
      insights: 运营洞察。
    preconditions:
      - 最好已经采集过至少一篇笔记数据。
    memory_reads:
      - note_metrics_data
    memory_writes:
      - last_account_analysis
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - reads_local_json
      - updates_session_memory
    tags:
      - account_data
      - analysis
      - metrics
      - strategy
    examples:
      - 分析账号最近笔记表现
      - 根据采集数据看看哪篇笔记最好
    messages:
      success: 已完成账号表现分析，共分析 {note_count} 篇笔记。
      observation_totals: 总点赞={like_count} 总收藏={collect_count} 总评论={comment_count} 总分享={share_count}

  plan_content_topics:
    description: 基于账号表现分析、评论样本和账号方向，生成下一批小红书内容选题，并保存到 data/content_topics.json。
    executor_type: tool
    executor_agent: account_management_service
    autonomy_level: medium
    manager_role: manager 在用户要求规划选题、制定下一批内容方向、根据数据给出创意时调用。
    input_schema:
      topic_count: 可选。需要生成的选题数量。
      focus: 可选。账号当前内容方向。
      output_file: 可选。选题保存路径。
    output_schema:
      topics: 选题列表。
      output_file: 保存文件。
    preconditions:
      - 可以先调用 analyze_account_performance；如果没有分析结果，该 skill 会自动读取本地指标数据。
    memory_reads:
      - last_account_analysis
      - note_metrics_data
    memory_writes:
      - planned_content_topics
      - planned_content_topics_file
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - reads_local_json
      - writes_local_json
      - updates_session_memory
    tags:
      - planning
      - topics
      - content_strategy
    examples:
      - 根据账号数据规划 5 个脚轮选题
      - 给我下一周的商品推荐选题
    messages:
      success: 已生成 {count} 个内容选题：{output_file}

  schedule_content_calendar:
    description: 将候选选题排成内容发布日历，默认每隔两天安排一篇，并保存到 data/content_calendar.json。
    executor_type: tool
    executor_agent: account_management_service
    autonomy_level: low
    manager_role: manager 在用户要求排期、制定发布计划、把选题安排到日历时调用。
    input_schema:
      start_date: 可选。起始日期，格式 YYYY-MM-DD。
      days_between_posts: 可选。每篇间隔天数。
      output_file: 可选。日历保存路径。
    output_schema:
      items: 排期列表。
      output_file: 保存文件。
    preconditions:
      - 最好已有 planned_content_topics；没有时会自动生成默认选题。
    memory_reads:
      - planned_content_topics
    memory_writes:
      - content_calendar
      - content_calendar_file
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - writes_local_json
      - updates_session_memory
    tags:
      - planning
      - calendar
      - scheduling
    examples:
      - 把这些选题排成下周日历
      - 从明天开始每两天安排一篇
    messages:
      success: 已生成内容日历，共 {count} 条：{output_file}

  reply_comments:
    description: 专用评论回复 skill。manager 提供回复目标、回复要求和可选评论上下文；该 skill 会把任务交给页面探索 agent 在小红书主站中完成评论定位、输入和发送前确认。
    executor_type: agent
    executor_agent: page_explorer
    autonomy_level: high
    manager_role: manager 在用户明确要求回复评论时调用，而不是直接调用通用 explore_page_task；该 skill 会构造更清晰的评论回复目标。
    input_schema:
      target_comment: 可选。目标评论或评论作者。
      reply_text: 可选。用户指定回复内容；为空时由页面探索 agent 根据上下文生成。
      user_goal: 可选。完整自然语言目标。
      max_steps: 可选。最大探索步数。
    output_schema:
      answer: 回复任务结果。
      steps: 页面探索步骤。
    preconditions:
      - 需要小红书主站可用。
      - 发送回复属于公开账号动作，执行发送前必须确认。
    memory_reads:
      - browser_session
      - last_collected_note_metrics
      - page_context
    memory_writes:
      - page_task_answer
      - page_task_steps
    risk_policy:
      requires_confirmation_for:
        - send_reply
      confirmation_owner: page_explorer
    risk_level: high
    side_effects:
      - opens_browser_if_needed
      - clicks_page
      - may_send_public_reply
    tags:
      - comments
      - reply
      - web_site
      - page
      - specialist_agent
    examples:
      - 根据喜仔的评论回复他
      - 回复最新一条评论，语气友好一点
    messages:
      missing_goal: target_comment、reply_text、user_goal 至少需要一个。
      success: 评论回复任务已完成。
      failed: 评论回复任务未完成。

  review_risky_action:
    description: 独立风险审核 skill。根据动作描述和上下文判断风险等级、是否需要用户确认，以及触发风险的关键词。
    executor_type: tool
    executor_agent: account_management_service
    autonomy_level: low
    manager_role: manager 在删除、发布、发送回复、覆盖内容、修改草稿等动作前调用，作为是否需要确认的辅助判断。
    input_schema:
      action_description: 必填。准备执行的动作描述。
      context: 可选。相关上下文。
    output_schema:
      risk_level: low、medium 或 high。
      requires_confirmation: 是否需要用户确认。
      recommendation: 审核建议。
    preconditions: []
    memory_reads:
      - current_goal
      - page_context
    memory_writes:
      - last_risk_review
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - updates_session_memory
    tags:
      - risk
      - confirmation
      - safety
      - tool
    examples:
      - 审核“删除第三篇草稿”是否需要确认
      - 判断“发送这条评论回复”风险
    messages:
      success: 风险审核完成：{risk_level}，需要确认={requires_confirmation}

  open_creator_page:
    description: 打开或复用小红书网页会话，可以打开创作中心 creator，也可以打开小红书主站 web，并保存到技能会话上下文中。
    executor_type: tool
    executor_agent: browser_session
    autonomy_level: low
    manager_role: manager 只在需要准备页面或切换站点时调用；复杂页面操作应交给 explore_page_task。
    input_schema:
      target_site: 可选。creator 表示创作中心；web 表示小红书主站；为空时默认 creator。
    output_schema:
      url: 当前页面 URL。
    preconditions: []
    memory_reads:
      - browser_session
    memory_writes:
      - browser_session
      - active_site
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - opens_browser
      - uses_persistent_browser_profile
    tags:
      - page
      - browser
      - setup
      - tool
    examples:
      - 打开小红书创作中心
      - 打开小红书主站
      - 准备页面环境
    messages:
      success: 已打开或复用小红书页面。
      observation_url: 当前 URL：{url}

  get_page_state:
    description: 获取当前浏览器页面状态，例如加载阶段、响应情况、网页弹窗、系统文件弹窗线索、文件输入框数量和当前 URL。
    executor_type: tool
    executor_agent: browser_state
    autonomy_level: low
    manager_role: manager 在判断页面是否卡住、是否需要等待或是否需要处理弹窗时调用。
    input_schema:
      target_site: 可选。creator 或 web；传入时先切换/打开对应页面。
    output_schema:
      state: 浏览器状态快照。
      summary: 状态摘要文本。
    preconditions:
      - 需要可用浏览器会话；没有时会打开默认页面。
    memory_reads:
      - browser_session
    memory_writes:
      - last_page_state
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - opens_browser_if_needed
      - reads_page_state
    tags:
      - page
      - browser
      - observe
      - tool
    examples:
      - 查看页面现在有没有卡住
      - 检查是否有弹窗
    messages:
      success: 页面状态已获取。

  observe_page_report:
    description: 生成给 manager_agent 阅读的页面观察报告。它不会暴露完整 DOM，而是返回当前站点、URL、加载状态、阻塞状态、网页弹窗、文件上传 input、重要可交互文本、页面可见摘要和建议下一步。
    executor_type: tool
    executor_agent: browser_state
    autonomy_level: low
    manager_role: manager 在需要了解“当前页面在哪里、页面是否加载完成、是否有弹窗/上传线索、有哪些重要按钮”时调用；如果要点击按钮、填写输入框、上传文件、删除、保存、回复评论等页面动作，应调用 explore_page_task，让 page_explorer 作为手脚执行。
    input_schema:
      target_site: 可选。creator 或 web；传入时先切换/打开对应页面。
    output_schema:
      report: 标准化 page_observation_report，包含 site、url、loading_phase、blocking_state、visible_summary、important_elements、dialogs、file_inputs、recommended_next。
    preconditions:
      - 需要可用浏览器会话；没有时会打开默认页面。
    memory_reads:
      - browser_session
      - page_state
    memory_writes:
      - last_page_observation_report
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - opens_browser_if_needed
      - reads_page_state
      - does_not_click_page
      - does_not_modify_page
    tags:
      - page
      - browser
      - observe
      - page_observation_report
      - manager_eyes
      - tool
    examples:
      - 看一下当前页面是什么状态
      - 判断现在页面有没有弹窗或者上传框
      - 先观察当前页面，再决定是否让页面 agent 操作
    messages:
      success: 页面观察报告已生成：site={site} blocking={blocking_state} next={recommended_next}

  explore_page_task:
    description: 高自治网页探索 agent。用于在创作中心和小红书主站之间自由切换，完成依赖当前网页状态的任务，包括查看草稿箱、读取或编辑草稿标题正文、保存当前草稿、删除目标草稿、打开主页、查看帖子详情、读取评论、点击评论右侧帖子封面预览、根据帖子内容回复评论等。
    executor_type: agent
    executor_agent: page_explorer
    autonomy_level: high
    manager_role: manager 只提供用户目标、可选站点和长期记忆线索；page_explorer 负责观察页面、选择工具、执行动作、维护 page_context，并在高风险动作前请求确认。
    input_schema:
      user_goal: 必填。用户对页面任务的自然语言目标。
      max_steps: 可选。最大探索步数。
      worklog_hints: 可选。长期记忆检索到的历史成功经验。
      target_site: 可选。creator 表示从创作中心开始；web 表示从小红书主站开始；为空时由 agent 根据目标和当前页面自行判断。
    output_schema:
      answer: 任务结果。
      steps: 探索步骤。
      next_suggestion: 下一步建议。
    preconditions:
      - 需要可用浏览器会话；没有时会打开或复用页面。
      - 删除、发送评论、发布等高风险动作必须由 page_explorer 返回 requires_user_confirmation 并由用户确认。
    memory_reads:
      - browser_session
      - page_context
      - long_term_memory
      - exploration_trace
    memory_writes:
      - page_task_answer
      - page_task_steps
      - page_context
      - exploration_trace
    risk_policy:
      requires_confirmation_for:
        - delete_draft
        - delete_note
        - publish_public_note
        - send_comment
        - send_reply
        - destructive_page_action
      confirmation_owner: page_explorer
    risk_level: variable
    side_effects:
      - opens_browser_if_needed
      - clicks_page
      - may_modify_page_content
      - may_switch_between_creator_and_web
    tags:
      - page
      - browser
      - exploration
      - operation
      - specialist_agent
      - creator_site
      - web_site
      - comments
      - drafts
    examples:
      - 保存当前草稿并回到首页
      - 查看草稿箱里的稿子详情
      - 把当前草稿标题改成 agent测试
      - 打开我的主页并查看最新帖子的评论
      - 根据喜仔的评论和所属帖子内容回复喜仔
      - 删除保存于 2026-05-31 19:38:43 的那篇草稿
    messages:
      missing_goal: user_goal 不能为空。
      failed: 页面探索任务未完成。
      success: 页面探索任务已完成。

  handle_dialogs:
    description: 尝试处理当前页面上的网页弹窗、上传收尾弹窗或文件选择器残留影响。复杂页面任务中通常由 explore_page_task 自己处理。
    executor_type: tool
    executor_agent: browser_dialog_handler
    autonomy_level: low
    manager_role: manager 仅在用户明确要求处理弹窗，或某个 skill 返回弹窗阻塞时调用。
    input_schema: {}
    output_schema:
      handled: 是否处理了弹窗。
    preconditions:
      - 需要可用浏览器会话。
    memory_reads:
      - browser_session
    memory_writes:
      - last_dialog_result
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - opens_browser_if_needed
      - clicks_dialog_controls
    tags:
      - page
      - browser
      - dialog
      - tool
    examples:
      - 关闭上传弹窗
      - 处理当前页面弹窗
    messages:
      success: 弹窗处理结果：{handled}

  show_session_memory:
    description: 读取当前技能会话记忆，包括已生成提示词、图片、标题正文、浏览器页面和当前 active_site。
    executor_type: tool
    executor_agent: session_memory
    autonomy_level: low
    manager_role: manager 在需要向用户解释当前进度或决定下一步前调用。
    input_schema: {}
    output_schema:
      memory_text: 会话记忆文本。
    preconditions: []
    memory_reads:
      - session_memory
      - browser_session
    memory_writes: []
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - reads_session_memory
    tags:
      - session
      - memory
      - tool
    examples:
      - 查看当前会话记忆
      - 现在有哪些已生成素材

  search_long_term_memory:
    description: 检索长期记忆，返回与当前请求相关的历史经验。支持 bm25、embedding、bm25_embedding、bm25_embedding_rerank 等策略；可用于测试 RAG 检索质量、解释 Agent 为什么复用某条经验，或在用户明确要求查看记忆时调用。
    executor_type: tool
    executor_agent: memory_retriever
    autonomy_level: low
    manager_role: manager 正常规划前会自动检索长期记忆；只有当用户要求查看、测试、调试、解释长期记忆检索结果，或需要主动选择检索策略时，才显式调用该 skill。
    input_schema:
      query: 必填。要检索的用户请求或任务目标。
      target_agent: 可选。manager_agent 或 page_explorer_agent；为空时不过滤。
      memory_types: 可选。manager_experience、page_path 等类型列表。
      site: 可选。creator、web 或 unknown。
      limit: 可选。返回条数。
      retrieval_method: 可选。bm25、embedding、bm25_embedding、bm25_embedding_rerank；为空时读取 cfg/memory.yaml 的 default_method。
      allow_fallback: 可选。所选策略不可用时是否回退到 fallback_method，默认 true。
      save_chunks: 可选。是否把当前统一 memory chunks 写入 agent_memory/memory_chunks.json。
      save_embedding_index: 可选。是否把当前 chunks 编码并写入 agent_memory/vector_store/ 下的 FAISS 向量库；缺失或变化的 chunk 才会重新编码。
      rebuild_embedding_index: 可选。是否强制重建向量库；开启后会重新编码所有 chunk。
    output_schema:
      hits: 检索到的记忆片段列表。
      count: 命中数量。
      requested_method: manager 请求的检索策略。
      effective_method: 实际执行的检索策略。
      available_methods: 当前可用策略说明。
      warnings: 策略回退或重排失败等提示。
      artifacts: 可能包含 memory_chunks.json 或 agent_memory/vector_store/ 的路径。
    preconditions:
      - agent_memory/xhs_agent_worklog.json 或 agent_memory/xhs_exploration_memory.json 至少存在一个。
    memory_reads:
      - xhs_agent_worklog
      - xhs_exploration_memory
      - memory_chunks
    memory_writes:
      - last_memory_search
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - reads_local_json
      - may_write_memory_chunks
      - updates_session_memory
    tags:
      - memory
      - rag
      - retrieval
      - debug
      - tool
    examples:
      - 检索和“查看草稿箱详情”相关的长期记忆
      - 测试 page_explorer_agent 能检索到哪些草稿箱路径
      - 把当前长期记忆转换成 memory_chunks.json
    messages:
      success: 已检索长期记忆，命中 {count} 条。
      missing_query: query 不能为空。

  close_session:
    description: 关闭当前浏览器和 Playwright 会话，释放页面资源。
    executor_type: tool
    executor_agent: browser_session
    autonomy_level: low
    manager_role: manager 只在用户明确要求结束会话时调用。
    input_schema: {}
    output_schema:
      closed: 是否已关闭。
    preconditions: []
    memory_reads:
      - browser_session
    memory_writes:
      - browser_session
    risk_policy:
      requires_confirmation_for: []
    risk_level: low
    side_effects:
      - closes_browser
    tags:
      - session
      - browser
      - tool
    examples:
      - 关闭当前浏览器会话
      - 结束本轮账号管理会话
    messages:
      success: 已关闭当前技能会话。
      observation: 当前技能会话已关闭。

