# Terminal agent action catalog.
#
# 这里维护“终端 Agent 可以调用哪些核心能力，以及什么时候应该调用”。
# 这些自然语言描述会被路由模型读取，用来判断用户请求应该走哪个 action。
#
# 调整建议：
# - 如果某句话经常被路由错，优先修改对应 action 的 choose_when / do_not_choose_when / examples。
# - create_draft 只表示“从零新建草稿”的完整流程。
# - 当前网页上的查看、编辑、删除、保存、暂存离开、返回首页等，都应交给 explore_page_task。

terminal_actions:
  - action: generate_prompts
    description: 根据本机图片或图片 URL 生成图片生成提示词。对应 test_image_prompt_generation.py 的提示词生成能力。
    args:
      input_image: 可选。本机图片路径或图片 URL。
      count: 可选。需要生成的提示词数量。
      user_goal: 可选。用户对图片风格、用途、主体和修改方向的自然语言要求。
    choose_when:
      - 用户明确要求生成图片提示词、看图写 prompt、根据某张图写出图提示词。
      - 用户还没有要求真正出图，只是在讨论提示词。
    do_not_choose_when:
      - 用户要求网页内查看、保存、删除、编辑草稿或帖子。
    examples:
      - 根据 doc/pic_exam.png 生成 3 条脚轮海报提示词
      - 帮我看这张图写出图 prompt

  - action: revise_prompts
    description: 修改当前会话已经生成的图片提示词。
    args:
      revision_instruction: 必填。用户对当前提示词的修改要求。
    choose_when:
      - 用户要求修改、优化、调整、补充、删减当前图片提示词。
    do_not_choose_when:
      - 用户要求修改小红书网页里某篇草稿的标题或正文。
    examples:
      - 第二张提示词加上 M6 参数信息
      - 把第一张改成有办公室背景

  - action: generate_images
    description: 根据当前会话中的图片提示词生成图片并保存到本机。对应 test_image_generation.py 的出图能力。
    args: {}
    choose_when:
      - 用户明确要求生成图片、出图、把当前提示词变成图片。
    do_not_choose_when:
      - 用户只是要求生成或修改提示词。
      - 用户要求网页内发帖、保存草稿、删除草稿。
    examples:
      - 满意了，生成图片
      - 用这些提示词出图

  - action: plan_note_text
    description: 根据当前图片提示词生成小红书帖子标题和正文。
    args:
      title: 可选。用户指定的标题；为空时由模型生成标题。
    choose_when:
      - 用户要求写小红书标题、正文、商品推荐文案、发帖文案。
    do_not_choose_when:
      - 用户要求修改网页当前草稿中的标题或正文。
    examples:
      - 根据这些图写一篇脚轮推荐正文
      - 帮我写标题和正文

  - action: create_draft
    description: 从头创建一篇新的小红书图文草稿：打开创作中心、上传素材、填写标题正文、暂存离开。对应 test_create_draft.py / test_generate_images_and_create_draft.py 的新建草稿能力。
    args: {}
    choose_when:
      - 用户明确要求创建一篇新的草稿、用当前图片和文案新建草稿、生成图片后自动发到草稿。
      - 用户说“用这些图片创建草稿”“新建一篇图文笔记草稿”。
    do_not_choose_when:
      - 用户已经在编辑页，只要求保存当前草稿、暂存离开、返回首页。
      - 用户要求查看、编辑、删除已有草稿或帖子。
      - 用户只是提到“草稿”但没有要求新建。
    examples:
      - 用这些图片创建草稿
      - 新建一篇图文笔记草稿

  - action: open_page
    description: 打开或复用小红书创作中心页面。
    args: {}
    choose_when:
      - 用户只要求打开创作中心、打开页面、进入小红书后台。
    do_not_choose_when:
      - 用户还要求在页面中执行查看、编辑、删除、保存等动作；这些应交给 explore_page_task。
    examples:
      - 打开创作中心
      - 帮我打开小红书页面

  - action: page_state
    description: 读取当前浏览器页面状态，例如是否加载完成、是否有系统弹窗、页面是否响应。
    args: {}
    choose_when:
      - 用户明确询问页面状态、浏览器状态、是否加载、是否有弹窗。
    do_not_choose_when:
      - 用户要求保存、查看、编辑、删除等实际页面操作。
    examples:
      - 页面现在是什么状态
      - 帮我看浏览器有没有卡住

  - action: handle_dialogs
    description: 尝试处理网页弹窗或上传后的收尾弹窗。
    args: {}
    choose_when:
      - 用户明确要求处理弹窗、关闭弹窗、检查弹窗。
    do_not_choose_when:
      - 用户要求保存当前草稿或执行复杂页面任务；这些由 explore_page_task 自己观察并处理。
    examples:
      - 处理弹窗
      - 帮我关闭上传弹窗

  - action: explore_page_task
    description: 通用网页操作 agent。用于查看、编辑、删除、保存当前草稿、暂存离开、返回首页、进入草稿箱、读取页面内容、处理已有帖子等所有依赖当前网页状态的任务。
    args:
      user_goal: 必填。原样保留用户对网页任务的自然语言目标。
    choose_when:
      - 用户要求操作当前网页上的已有内容。
      - 用户要求保存当前草稿、暂存离开、回到首页。
      - 用户要求查看草稿箱、查看帖子详情、读取正文、修改当前草稿标题/正文。
      - 用户要求删除、移除、撤回某篇草稿/帖子。
      - 用户的目标依赖当前页面处于哪里。
    do_not_choose_when:
      - 用户明确要求从零创建一篇新草稿，并且使用当前会话生成的图片和文案。
      - 用户明确要求生成图片、生成提示词、写文案这些离线任务。
    examples:
      - 保存草稿回到首页
      - "为我删除保存于2026-05-31 19:38:43那篇帖子"
      - 查看草稿箱里面的稿子详情
      - 把当前草稿标题改成 agent测试

  - action: chat
    description: 普通对话或无法映射到已有能力的请求。
    args:
      message: 用户原始输入。
    choose_when:
      - 用户只是提问、讨论方案、解释概念，或者请求不属于任何工具能力。
    do_not_choose_when:
      - 用户要求执行明确的图片生成、发帖、网页操作任务。
    examples:
      - 你觉得这个方案合理吗
      - 解释一下当前架构
