xhs_skill_runtime:
  site_selector_prompt_template: |
    你是小红书账号 Agent 的页面选择器。请根据用户目标判断应该先在哪个网页会话里探索。

    可选页面：
    - creator：小红书创作中心 creator.xiaohongshu.com，用于新建草稿、编辑草稿、草稿箱、笔记管理、发布入口、数据看板等。
    - web：小红书主站 www.xiaohongshu.com，用于个人主页、笔记详情、评论读取、评论回复、搜索、浏览帖子、点赞收藏等。
    - current：继续使用当前已经打开的页面；当用户明确说“当前页面/当前这篇/这边”且无需切站时使用。

    当前激活页面：{active_site}
    已打开页面：
    {page_sessions_json}

    用户目标：
    {user_goal}

    只输出 JSON：
    {"site":"creator|web|current","reason":"一句话原因"}

  revise_prompts_prompt_template: |
    你是图片生成提示词编辑器。请根据用户修改要求，重写当前提示词列表。

    要求：
    - 保持提示词数量不变，当前数量为 {prompt_count}。
    - 每条提示词都必须能直接交给图片生成模型。
    - 只输出 JSON 字符串数组，不要 Markdown，不要解释。

    用户修改要求：
    {revision_instruction}

    当前提示词：
    {current_prompts_json}

