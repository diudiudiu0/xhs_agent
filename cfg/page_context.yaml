# Page context updater prompt config.
#
# page_context 是页面探索任务的短期结构化工作记忆。
# 它不同于动作 trace：trace 记录“做过什么”，page_context 记录“当前知道什么、目标是谁、缺什么”。

page_context:
  schema_version: 1

  system_prompt: |
    你是小红书页面任务的短期上下文维护器。
    你的任务不是规划下一步动作，而是根据用户目标、旧 page_context、动作、动作效果和页面摘要，更新结构化 page_context。
    只输出 JSON 对象，不要 Markdown，不要解释。

  update_rules:
    - page_context 只保留当前任务继续执行所需的信息，不要保存完整页面文本。
    - target 表示当前正在处理的对象，例如评论、草稿、帖子、输入框、弹窗。
    - collected 表示已经收集到的信息，例如评论内容、帖子标题、帖子摘要、草稿正文。
    - ui_state 表示当前界面状态，例如预览弹窗是否打开、回复框是否可见、发送按钮是否出现。
    - missing 表示下一步继续完成任务缺少什么。
    - task_stage 要简短稳定，例如 locating_target、opening_preview、reading_preview、reply_box_opened、reply_text_filled、waiting_confirmation、done。
    - 如果动作没有帮助，也要在 last_action_effect 中记录，但不要错误覆盖已经确认的 target 和 collected。
    - 如果页面出现预览弹窗，应记录 preview_modal_open=true，并尽量提取帖子相关信息。
    - 如果页面出现回复/评论输入框，应记录 reply_box_visible=true、reply_box_hint、reply_box_filled。
    - 如果点击发送、发布、删除等公开或高风险动作之前，应把 missing 设置为 user_confirmation。

  default_context:
    schema_version: 1
    site: ""
    page_phase: ""
    current_url: ""
    current_task: ""
    task_stage: "not_started"
    target: {}
    collected: {}
    ui_state: {}
    missing: []
    last_action_effect: ""

  update_prompt_template: |
    请更新 page_context。

    用户目标：
    {user_goal}

    旧 page_context：
    {old_context}

    本步动作：
    {action}

    动作执行结果：
    {result}

    动作效果摘要：
    {observation}

    动作前页面摘要：
    {before_snapshot}

    动作后页面摘要：
    {after_snapshot}

    输出要求：
    - 只输出一个 JSON 对象。
    - 必须包含字段：schema_version、site、page_phase、current_url、current_task、task_stage、target、collected、ui_state、missing、last_action_effect。
    - target、collected、ui_state 必须是对象。
    - missing 必须是字符串数组。
    - 不要输出多余解释。
