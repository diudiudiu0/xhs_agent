<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XHS Agent 工作台</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Xiaohongshu Account Manager</p>
          <h1>XHS Agent 工作台</h1>
        </div>
        <div class="header-actions">
          <span id="serviceStatus" class="status-pill">连接中</span>
          <button id="refreshState" type="button">刷新状态</button>
        </div>
      </header>

      <section class="chat-panel panel">
        <div class="panel-title">
          <h2>对话</h2>
          <span class="muted">Ctrl + Enter 发送</span>
        </div>
        <section id="messages" class="messages" aria-live="polite"></section>
        <form id="chatForm" class="composer">
          <textarea
            id="messageInput"
            rows="4"
            placeholder="例如：刷新我的已发布笔记数据并分析下一篇脚轮内容怎么写"
          ></textarea>
          <div class="composer-actions">
            <button id="sendButton" type="submit">发送</button>
            <button id="stopButton" type="button">停止当前任务</button>
            <button id="confirmButton" type="button" data-message="y" hidden>确认</button>
            <button id="cancelButton" type="button" data-message="n" hidden>取消</button>
          </div>
        </form>
      </section>

      <section class="work-panel panel">
        <div class="panel-title">
          <h2>执行过程</h2>
          <span id="agentStatus" class="state-badge">-</span>
        </div>
        <dl class="state-grid">
          <div>
            <dt>当前目标</dt>
            <dd id="currentGoal">-</dd>
          </div>
          <div>
            <dt>运行任务</dt>
            <dd id="currentTask">-</dd>
          </div>
          <div>
            <dt>队列</dt>
            <dd id="queueSize">0</dd>
          </div>
          <div>
            <dt>最终答复</dt>
            <dd id="finalAnswer">-</dd>
          </div>
        </dl>

        <div class="section-heading">
          <h3>规划与 Skill 调用</h3>
        </div>
        <ol id="steps" class="steps"></ol>

        <div class="section-heading">
          <h3>每步记忆检索</h3>
          <span class="muted">goal 为总目标记忆，current_step 为当前步骤记忆</span>
        </div>
        <div id="memoryLookups" class="memory-lookups"></div>
      </section>

      <aside class="tools-panel">
        <section class="panel">
          <div class="panel-title">
            <h2>实时事件</h2>
            <span class="muted">最近 80 条</span>
          </div>
          <div id="eventLog" class="event-log"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>手动记忆检索</h2>
          </div>
          <form id="memoryForm" class="tool-form">
            <input id="memoryQuery" type="text" placeholder="输入要检索的任务或页面操作" />
            <div class="field-row">
              <select id="retrievalMethod">
                <option value="bm25_embedding">BM25 + Embedding</option>
                <option value="embedding">Embedding</option>
                <option value="bm25">BM25</option>
                <option value="bm25_embedding_rerank">Hybrid + Rerank</option>
              </select>
              <select id="targetAgent">
                <option value="manager_agent">Manager</option>
                <option value="page_explorer_agent">Page Explorer</option>
                <option value="">不过滤</option>
              </select>
            </div>
            <button type="submit">检索记忆</button>
          </form>
          <pre id="memoryResult" class="result-box"></pre>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>向量库</h2>
          </div>
          <div class="field-row">
            <button id="buildVector" type="button">增量构建</button>
            <button id="rebuildVector" type="button">强制重建</button>
          </div>
          <pre id="vectorResult" class="result-box"></pre>
        </section>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
